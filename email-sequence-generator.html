<!-- ============================================================
     HTML
     This is the structure of the page: the text area, the button,
     and the container where the 5 generated emails will appear.
     Everything inside <head> and <body> below is HTML.
     ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Email Sequence Generator</title>

<!-- ============================================================
     CSS
     This is the styling: colors, spacing, fonts, layout. It
     controls appearance only, no behavior.
     ============================================================ -->
<style>
  :root {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --border: #dde3ea;
    --text-primary: #1a2433;
    --text-secondary: #5b6b7f;
    --blue: #2563eb;
    --blue-hover: #1d4ed8;
    --blue-light: #eaf1fe;
    --radius: 10px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 6px;
    letter-spacing: -0.02em;
  }

  header p {
    margin: 0;
    color: var(--text-secondary);
    font-size: 15px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    padding: 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    resize: vertical;
    line-height: 1.5;
  }

  textarea:focus {
    outline: none;
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-light);
  }

  textarea::placeholder {
    color: #9aa7b8;
  }

  .actions {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  button#generate-btn {
    background: var(--blue);
    color: #fff;
    border: none;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }

  button#generate-btn:hover {
    background: var(--blue-hover);
  }

  button#generate-btn:active {
    transform: translateY(1px);
  }

  button#generate-btn:disabled {
    background: #a9c1f5;
    cursor: not-allowed;
  }

  .status {
    font-size: 14px;
    color: var(--text-secondary);
    display: none;
  }

  .status.visible {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--blue-light);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-message {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
    border-radius: 8px;
    font-size: 14px;
  }

  .error-message.visible {
    display: block;
  }

  #results-section {
    margin-top: 32px;
  }

  #results-section h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin: 0 0 14px;
  }

  .empty-state {
    color: var(--text-secondary);
    font-size: 14px;
    padding: 20px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 8px;
    background: var(--surface);
  }

  .email-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .email-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .email-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .email-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stage-badge {
    background: var(--blue-light);
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 4px 10px;
    border-radius: 999px;
  }

  .email-number {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  .copy-btn {
    background: var(--blue-light);
    color: var(--blue);
    border: none;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s ease;
  }

  .copy-btn:hover {
    background: #d9e6fd;
  }

  .copy-btn.copied {
    background: #dcfce7;
    color: #16a34a;
  }

  .field-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }

  .email-subject {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .email-body {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--text-primary);
    white-space: pre-wrap;
  }
</style>
</head>

<!-- ============================================================
     HTML (continued)
     The <body> holds everything the user actually sees: the
     heading, the textarea, the button, and the results section.
     ============================================================ -->
<body>

<div class="page">
  <header>
    <h1>Sales Email Sequence Generator</h1>
    <p>Paste a product description and get a complete 5-email sales sequence, ready to read and copy.</p>
  </header>

  <div class="card">
    <label for="product-description">Product description</label>
    <textarea
      id="product-description"
      placeholder="e.g. A reusable water bottle that keeps drinks cold for 24 hours, made from recycled stainless steel, available in five colors..."
    ></textarea>

    <div class="actions">
      <button id="generate-btn">Generate Email Sequence</button>
      <span class="status" id="status">
        <span class="spinner"></span>
        <span>Generating...</span>
      </span>
    </div>

    <div class="error-message" id="error-message"></div>
  </div>

  <div id="results-section">
    <h2>Generated Email Sequence</h2>
    <div id="results-container">
      <div class="empty-state" id="empty-state">
        Your 5-email sequence will appear here once generated.
      </div>
      <ul class="email-list" id="email-list" style="display: none;"></ul>
    </div>
  </div>
</div>

<!-- ============================================================
     JAVASCRIPT
     This is the behavior: what happens when the button is clicked,
     how the app talks to Claude, and how the emails get added to
     the page. Everything inside this <script> tag is JavaScript.
     ============================================================ -->
<script>
  const textarea = document.getElementById('product-description');
  const generateBtn = document.getElementById('generate-btn');
  const statusEl = document.getElementById('status');
  const errorEl = document.getElementById('error-message');
  const emptyState = document.getElementById('empty-state');
  const emailList = document.getElementById('email-list');

  // The 5 fixed stages of the sequence, in order.
  const SEQUENCE_STAGES = [
    'Introduction',
    'Benefits',
    'Objection Handling',
    'Urgency',
    'Final Call to Action',
  ];

  generateBtn.addEventListener('click', handleGenerateClick);

  async function handleGenerateClick() {
    const description = textarea.value.trim();

    hideError();

    if (!description) {
      showError('Please paste a product description first.');
      return;
    }

    setLoading(true);

    try {
      const emails = await callClaudeForEmailSequence(description);
      renderEmails(emails);
    } catch (err) {
      showError('Something went wrong while generating the email sequence. Please try again.');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  /**
   * Calls our deployed backend on Render, which in turn calls
   * Claude and returns the generated sequence. Since this backend
   * is deployed (not running on localhost), this works from any
   * device - computer, phone, tablet, anywhere with internet.
   */
  async function callClaudeForEmailSequence(description) {
    const response = await fetch('https://email-generator-rkyy.onrender.com/api/generate-email-sequence', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description }),
    });

    if (!response.ok) {
      throw new Error('Request to backend failed');
    }

    const data = await response.json();
    return data.emails; // array of 5 { stage, subject, body } objects
  }

  function renderEmails(emails) {
    emailList.innerHTML = '';

    emails.forEach((email, index) => {
      const li = document.createElement('li');
      li.className = 'email-card';

      // Header: stage badge + email number + copy button
      const header = document.createElement('div');
      header.className = 'email-card-header';

      const meta = document.createElement('div');
      meta.className = 'email-meta';

      const badge = document.createElement('span');
      badge.className = 'stage-badge';
      badge.textContent = email.stage;

      const number = document.createElement('span');
      number.className = 'email-number';
      number.textContent = `Email ${index + 1} of 5`;

      meta.appendChild(badge);
      meta.appendChild(number);

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.textContent = 'Copy Email';
      copyBtn.addEventListener('click', () =>
        copyToClipboard(`${email.subject}\n\n${email.body}`, copyBtn)
      );

      header.appendChild(meta);
      header.appendChild(copyBtn);

      // Subject line
      const subjectLabel = document.createElement('div');
      subjectLabel.className = 'field-label';
      subjectLabel.textContent = 'Subject line';

      const subject = document.createElement('div');
      subject.className = 'email-subject';
      subject.textContent = email.subject;

      // Body
      const bodyLabel = document.createElement('div');
      bodyLabel.className = 'field-label';
      bodyLabel.textContent = 'Body';

      const body = document.createElement('div');
      body.className = 'email-body';
      body.textContent = email.body;

      li.appendChild(header);
      li.appendChild(subjectLabel);
      li.appendChild(subject);
      li.appendChild(bodyLabel);
      li.appendChild(body);

      emailList.appendChild(li);
    });

    emptyState.style.display = 'none';
    emailList.style.display = 'flex';
  }

  function copyToClipboard(text, btnEl) {
    navigator.clipboard.writeText(text).then(() => {
      const originalText = btnEl.textContent;
      btnEl.textContent = 'Copied';
      btnEl.classList.add('copied');
      setTimeout(() => {
        btnEl.textContent = originalText;
        btnEl.classList.remove('copied');
      }, 1500);
    });
  }

  function setLoading(isLoading) {
    generateBtn.disabled = isLoading;
    statusEl.classList.toggle('visible', isLoading);
  }

  function showError(message) {
    errorEl.textContent = message;
    errorEl.classList.add('visible');
  }

  function hideError() {
    errorEl.classList.remove('visible');
    errorEl.textContent = '';
  }
</script>

</body>
</html>
